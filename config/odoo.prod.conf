; ─────────────────────────────────────────────────────────────────────────────
; PRIVATE / VALIDATION mode — real pco_core via the submodule mount.
; Used ONLY inside the private monorepo (or internal Colab with a token), to
; validate the SAME guard against real models. Never published.
; ─────────────────────────────────────────────────────────────────────────────
[options]
; 1) Odoo core  2) public guard (mock NOT loaded here — real pco_core replaces it)
;    3) real private business addons mounted at dependencies/pco_core/addons
addons_path = /opt/odoo/addons,/opt/odoo/odoo/addons,./addons,./dependencies/pco_core/addons
db_name = pco_validation
admin_passwd = ${ODOO_ADMIN_PASSWD}
xmlrpc_port = 8069
list_db = False
log_level = info
; NOTE: install pg_agent_guard but NOT pco_core_mock here — the guard runs against
; the real pco.sale.order.* models. POLICY paths are identical, so no code change.
