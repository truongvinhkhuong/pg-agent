name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  # ── Fast lane: syntax, offline unit tests, secret/raw-data regression gate ──
  static-checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Compile (syntax gate)
        run: python -m compileall -q addons data tests scripts

      - name: Offline unit tests (no Odoo, no LLM)
        run: |
          python tests/test_output_validator.py
          python tests/test_sensitivity_registry.py
          python tests/test_policy_closure.py
          python tests/test_policy_scan.py
          python tests/test_policy_emit.py
          python tests/test_endemic.py
          python tests/test_policy_model.py
          python tests/test_docrag.py
          python tests/test_agent_loop.py
          python tests/test_numeric_verifier.py
          python tests/test_metrics_and_consistency.py
          python tests/test_redteam.py

      - name: Secret + raw-data regression gate (detect-secrets via pre-commit)
        run: |
          python -m pip install --upgrade pip
          pip install pre-commit detect-secrets
          pre-commit run --all-files --show-diff-on-failure

  # ── ERP-AuthZBench: run the real guard in Odoo 19, gate on guard-clean ──
  authzbench:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        variant: ["team_security.xml", "team_security_vrule.xml"]
    container:
      image: odoo:19
      options: --user root
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: odoo
          POSTGRES_DB: postgres
          POSTGRES_HOST_AUTH_METHOD: trust   # ephemeral CI DB on the job network; no password
        options: >-
          --health-cmd "pg_isready -U odoo"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4

      - name: Select schema variant (${{ matrix.variant }})
        run: sed -i 's#"security/team_security[A-Za-z_]*\.xml"#"security/${{ matrix.variant }}"#' addons/pco_core_mock/__manifest__.py

      - name: Install addons
        run: |
          odoo -d ci \
            --addons-path="$GITHUB_WORKSPACE/addons,/usr/lib/python3/dist-packages/odoo/addons" \
            --db_host=postgres --db_port=5432 --db_user=odoo \
            -i pco_core_mock,pg_agent_guard --stop-after-init --no-http --without-demo=all

      - name: ERP-AuthZBench gate
        shell: bash
        run: |
          out=$(odoo shell -d ci \
            --addons-path="$GITHUB_WORKSPACE/addons,/usr/lib/python3/dist-packages/odoo/addons" \
            --db_host=postgres --db_port=5432 --db_user=odoo --no-http 2>/dev/null <<'PY'
          exec(open('tests/evaluation_script.py').read()); ci_gate(env)
          PY
          )
          echo "$out"
          echo "$out" | grep -q 'BENCH_GATE: PASS'
